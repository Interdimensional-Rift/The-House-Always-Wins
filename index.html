<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Interdimensional</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container"></div>

    <!-- IMPORTANTE: defer para que el DOM exista -->
    <script src="script.js" defer></script>

    <audio id="casinoMusic" loop autoplay>
  <source id="musicSource" src="Musica/" type="audio/mpeg">
  Tu navegador no soporta audio.
</audio>

<button onclick="toggleMute()">Music On/Off</button>
<button onclick="changeMusic('Musica/Interdimensional Casino (Instrumental).mp3')">Instrumental</button>
<button onclick="changeMusic('Musica/Interdimensional Casino (Lyrics).mp3')">Lyrics</button>

<script>
  const music = document.getElementById('casinoMusic');
  const source = document.getElementById('musicSource');

  function toggleMute() {
    if (music.paused) {
      music.play();
    } else {
      music.pause();
    }
  }

  function changeMusic(file) {
    const isPlaying = !music.paused;
    music.pause();
    source.src = file;
    music.load();
    if (isPlaying) music.play();
  }
</script>

</body>
</html>
